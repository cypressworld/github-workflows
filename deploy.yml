name: Build and Deploy to Cloud 
on:
  push:
     branches:[ main ] # Triggered every time you save code
 
jobs: 
   deploy: 
    runs-on: ubuntu-latest
    steps:
     - name: checkout code
       uses: actions/checkout@v4
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secretes.GCP_SA_KEY }}

    - name: Build and Push Docker Image
      run: | docker build -t gcr.io/my-project/link-shield:latest .
      docker push gcr.io/my-project/link-shield:latest

    - name: Deploy to Cloud Run (Serverless Docker)
      uses: google-github-actions/deploy-cloudrun@v2
      with:
         service: link-shield-service
         image: gcr.io/my-project/link-shield:latest
         region: us-central